# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          # Domínio customizado (ex.: www.madetoys.com.br) = site na raiz → use "/".
          # Só use subpath se publicar em https://<user>.github.io/<repo>/ (defina a variável
          # de repositório VITE_BASE_PATH, ex.: /madetoys-brincar-que-desenvolve/).
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH != '' && vars.VITE_BASE_PATH || '/' }}
        run: npm run build
      - name: SPA fallback (404 → index)
        run: cp dist/client/index.html dist/client/404.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Apenas o bundle estático + index.html gerados pelo prerender
          path: './dist/client'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4